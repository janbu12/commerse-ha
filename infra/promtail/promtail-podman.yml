server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: podman-api-logs
    static_configs:
      - targets: [localhost]
        labels:
          job: ecommerce
          container_name: ecommerce-api-1
          __path__: /var/log/pods/d4e20fecbd68f2a8e0bc4330689db8868480450ae5e8164610894f4a58fcb324/userdata/ctr.log
      - targets: [localhost]
        labels:
          job: ecommerce
          container_name: ecommerce-api-2
          __path__: /var/log/pods/27a351f44e544b3c28162bde3f68b1caa7492f6a852053ea108e1ec7c6687295/userdata/ctr.log
      - targets: [localhost]
        labels:
          job: ecommerce
          container_name: ecommerce-api-3
          __path__: /var/log/pods/9fe33d0bc315a50fd907520e15b444921543e9455b4c313cdc4ddd7f73e5da3c/userdata/ctr.log
    
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            time: time
      - timestamp:
          source: time
          format: RFC3339
      - output:
          source: output
