services:
  haproxy:
    image: docker.io/haproxy:3.0-alpine
    container_name: ecommerce-haproxy
    ports:
      - "80:8080"
      - "8404:8404"
    volumes:
      - ./infra/haproxy/haproxy-podman.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro,Z
    depends_on:
      ecommerce-api-1:
        condition: service_healthy
      ecommerce-api-2:
        condition: service_healthy
      ecommerce-api-3:
        condition: service_healthy
    networks:
      - ecommerce-network

  ecommerce-api-1:
    build: .
    container_name: ecommerce-api-1
    environment:
      APP_PORT: 3001
      APP_INSTANCE_ID: api-1
      DATABASE_URL: postgresql://ecommerce:ecommerce_password@postgres-master:5432/ecommerce
      DATABASE_REPLICA_URL: postgresql://ecommerce:ecommerce_password@postgres-replica:5432/ecommerce
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-minimum-32-characters}
      COOKIE_SECRET: ${COOKIE_SECRET:-change-me-minimum-32-characters}
      MIDTRANS_WEBHOOK_SECRET: ${MIDTRANS_WEBHOOK_SECRET:-change-me}
      LOG_LEVEL: info
    ports:
      - "3001:3001"
    depends_on:
      postgres-master:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    logging:
      driver: k8s-file
    networks:
      - ecommerce-network

  ecommerce-api-2:
    build: .
    container_name: ecommerce-api-2
    environment:
      APP_PORT: 3001
      APP_INSTANCE_ID: api-2
      DATABASE_URL: postgresql://ecommerce:ecommerce_password@postgres-master:5432/ecommerce
      DATABASE_REPLICA_URL: postgresql://ecommerce:ecommerce_password@postgres-replica:5432/ecommerce
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-minimum-32-characters}
      COOKIE_SECRET: ${COOKIE_SECRET:-change-me-minimum-32-characters}
      MIDTRANS_WEBHOOK_SECRET: ${MIDTRANS_WEBHOOK_SECRET:-change-me}
      LOG_LEVEL: info
    ports:
      - "3002:3001"
    depends_on:
      postgres-master:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    logging:
      driver: k8s-file
    networks:
      - ecommerce-network

  ecommerce-api-3:
    build: .
    container_name: ecommerce-api-3
    environment:
      APP_PORT: 3001
      APP_INSTANCE_ID: api-3
      DATABASE_URL: postgresql://ecommerce:ecommerce_password@postgres-master:5432/ecommerce
      DATABASE_REPLICA_URL: postgresql://ecommerce:ecommerce_password@postgres-replica:5432/ecommerce
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-minimum-32-characters}
      COOKIE_SECRET: ${COOKIE_SECRET:-change-me-minimum-32-characters}
      MIDTRANS_WEBHOOK_SECRET: ${MIDTRANS_WEBHOOK_SECRET:-change-me}
      LOG_LEVEL: info
    ports:
      - "3003:3001"
    depends_on:
      postgres-master:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    logging:
      driver: k8s-file
    networks:
      - ecommerce-network

  postgres-master:
    image: docker.io/bitnamilegacy/postgresql:16
    container_name: postgres-master
    environment:
      POSTGRESQL_REPLICATION_MODE: master
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: replication_password
      POSTGRESQL_USERNAME: ecommerce
      POSTGRESQL_PASSWORD: ecommerce_password
      POSTGRESQL_DATABASE: ecommerce
      POSTGRESQL_POSTGRES_PASSWORD: postgres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-master-data:/bitnami/postgresql
      - ./database/init:/docker-entrypoint-initdb.d:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    networks:
      - ecommerce-network

  postgres-replica:
    image: docker.io/bitnamilegacy/postgresql:16
    container_name: postgres-replica
    environment:
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: replication_password
      POSTGRESQL_MASTER_HOST: postgres-master
      POSTGRESQL_MASTER_PORT_NUMBER: 5432
      POSTGRESQL_USERNAME: ecommerce
      POSTGRESQL_PASSWORD: ecommerce_password
      POSTGRESQL_DATABASE: ecommerce
      POSTGRESQL_POSTGRES_PASSWORD: postgres_password
    ports:
      - "5433:5432"
    depends_on:
      postgres-master:
        condition: service_healthy
    volumes:
      - postgres-replica-data:/bitnami/postgresql
    networks:
      - ecommerce-network

  redis:
    image: docker.io/redis:7-alpine
    container_name: ecommerce-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - ecommerce-network

  redis-exporter:
    image: docker.io/oliver006/redis_exporter:v1.67.0
    container_name: ecommerce-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ecommerce-network

  prometheus:
    image: docker.io/prom/prometheus:v2.55.1
    container_name: ecommerce-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus-podman.yml:/etc/prometheus/prometheus.yml:ro,Z
    networks:
      - ecommerce-network

  grafana:
    image: docker.io/grafana/grafana:11.3.0
    container_name: ecommerce-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro,Z
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro,Z
    networks:
      - ecommerce-network

  loki:
    image: docker.io/grafana/loki:3.3.0
    container_name: ecommerce-loki
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki/loki.yml:/etc/loki/local-config.yaml:ro,Z
    command: ["-config.file=/etc/loki/local-config.yaml"]
    networks:
      - ecommerce-network

  # ============================================================
  # PROMTAIL — Log shipping
  # ============================================================
  # CATATAN: Promtail Docker service discovery TIDAK bekerja di Podman.
  # Config promtail-podman.yml menggunakan static_configs sebagai gantinya.
  # 
  # Jika logging penting, aktifkan service ini dan sesuaikan volume mount
  # ke lokasi log container Podman di WSL2 VM Anda.
  # Cek: podman inspect <container> --format '{{.LogPath}}'
  promtail:
    image: docker.io/grafana/promtail:3.3.0
    container_name: ecommerce-promtail
    user: root
    volumes:
      - ./infra/promtail/promtail-podman.yml:/etc/promtail/config.yml:ro,Z
      - /var/lib/containers/storage/overlay-containers:/var/log/pods:ro,Z
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      loki:
        condition: service_started
    networks:
      - ecommerce-network

  # ============================================================
  # cAdvisor — TIDAK KOMPATIBEL DENGAN PODMAN
  # ============================================================
  # cAdvisor membutuhkan Docker daemon socket.
  # Alternatif: gunakan `podman stats` atau install
  # prometheus-podman-exporter (https://github.com/containers/prometheus-podman-exporter)

  # ============================================================
  # Container Name Exporter
  # ============================================================
  # CATATAN: Service ini bergantung pada Docker socket API.
  # Di Podman pada Linux, mount socket Podman:
  #   $XDG_RUNTIME_DIR/podman/podman.sock → /var/run/docker.sock
  # Di Podman Machine (Windows/Mac), socket biasanya di dalam VM.
  # Jika tidak butuh, bisa di-comment.
  # container-name-exporter:
  #   build: ./infra/container-name-exporter
  #   container_name: ecommerce-container-name-exporter
  #   environment:
  #     DOCKER_SOCKET_PATH: /var/run/docker.sock
  #   volumes:
  #     - /run/podman/podman.sock:/var/run/docker.sock:ro
  #   ports:
  #     - "9500:9500"
  #   networks:
  #     - ecommerce-network

  node-exporter:
    image: docker.io/prom/node-exporter:v1.8.2
    container_name: ecommerce-node-exporter
    volumes:
      - /:/host:ro,rslave
    command:
      - '--path.rootfs=/host'
    ports:
      - "9100:9100"
    networks:
      - ecommerce-network

  postgres-exporter:
    image: docker.io/prometheuscommunity/postgres-exporter:v0.16.0
    container_name: ecommerce-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:postgres_password@postgres-master:5432/ecommerce?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      postgres-master:
        condition: service_healthy
    networks:
      - ecommerce-network

  # ============================================================
  # Podman Exporter — Pengganti cAdvisor untuk metrik container
  # ============================================================
  podman-exporter:
    image: quay.io/navidys/prometheus-podman-exporter:latest
    container_name: ecommerce-podman-exporter
    privileged: true
    security_opt:
      - label=disable
    environment:
      - CONTAINER_HOST=unix:///run/user/1000/podman/podman.sock
    volumes:
      - /run/user/1000/podman/podman.sock:/run/user/1000/podman/podman.sock:ro
    ports:
      - "9882:9882"
    network_mode: host
    pid: host
    networks:
      - ecommerce-network

  # ============================================================
  # k6 — Load Testing
  # ============================================================
  k6:
    image: docker.io/grafana/k6:latest
    container_name: ecommerce-k6
    volumes:
      - ./tests/load:/scripts:ro,Z
    environment:
      - BASE_URL=http://ecommerce-haproxy:8080
    command: run /scripts/k6-script.js
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge

volumes:
  postgres-master-data:
  postgres-replica-data:
  redis-data:
  grafana-data:
