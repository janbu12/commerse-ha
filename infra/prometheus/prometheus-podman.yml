global:
  scrape_interval: 15s

scrape_configs:
  - job_name: ecommerce-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - ecommerce-api-1:3001
          - ecommerce-api-2:3001
          - ecommerce-api-3:3001

  - job_name: haproxy
    static_configs:
      - targets: ['haproxy:8404']

  # cAdvisor tidak tersedia di Podman — di-disable
  # - job_name: cadvisor
  #   static_configs:
  #     - targets: ['cadvisor:8080']

  # Container-name-exporter di-disable (butuh Docker socket)
  # - job_name: container-name-exporter
  #   static_configs:
  #     - targets: ['container-name-exporter:9500']

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'postgres'
    static_configs:
      - targets: ['ecommerce-postgres-exporter:9187']

  - job_name: 'podman-exporter'
    scrape_interval: 35s
    scrape_timeout: 30s
    static_configs:
      - targets: ['ecommerce-podman-exporter:9882']
    relabel_configs:
      - source_labels: [container]
        target_label: container_name
      - source_labels: [name]
        target_label: container_name

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']
