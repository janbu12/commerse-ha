global
  log stdout format raw local0

defaults
  mode http
  log global
  option httplog
  option dontlognull
  option redispatch
  retries 3
  timeout connect 5s
  timeout client 30s
  timeout server 30s

resolvers docker
  nameserver dns 127.0.0.11:53
  resolve_retries 3
  timeout resolve 1s
  timeout retry 1s
  hold valid 10s

frontend ecommerce_http
  bind *:80
  default_backend ecommerce_api

backend ecommerce_api
  balance roundrobin
  option httpchk GET /health
  http-check expect status 200
  default-server inter 2s fastinter 1s downinter 1s fall 1 rise 2 resolvers docker resolve-prefer ipv4 init-addr last,libc,none
  server api1 ecommerce-api-1:3001 check
  server api2 ecommerce-api-2:3001 check
  server api3 ecommerce-api-3:3001 check

frontend stats
  bind *:8404
  http-request use-service prometheus-exporter if { path /metrics }
  stats enable
  stats uri /stats
  stats refresh 10s
